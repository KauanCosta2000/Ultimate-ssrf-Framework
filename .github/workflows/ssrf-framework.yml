name: Periodic SSRF Scan

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "targets.txt"

jobs:
  ssrf-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Output Directory
        run: mkdir -p output

      - name: Pull Docker Image
        run: docker pull ghcr.io/kauancosta2000/ultimate-ssrf-framework:latest

      - name: Run SSRF Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/output:/app/output \
            -v ${{ github.workspace }}/targets.txt:/app/targets.txt:ro \
            ghcr.io/kauancosta2000/ultimate-ssrf-framework:latest \
            --target-file /app/targets.txt \
            --output /app/output \
            --quiet \
            --delay 1

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: ssrf-reports
          path: output/
          retention-days: 7

      - name: Workflow Summary
        run: |
          echo "## SSRF Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "Reports are available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
